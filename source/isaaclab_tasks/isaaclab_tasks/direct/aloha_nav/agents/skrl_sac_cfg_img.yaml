seed: 42


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  custom_model_base: &custom_model_base
    class: models.custom_gmodel.CustomCritic
    clip_actions: False

  policy:
    class: models.custom_gmodel.CustomActor
    clip_actions: True
    clip_log_std: True
    min_log_std: -5.0
    max_log_std: 2.0

  critic_1:
    <<: *custom_model_base

  critic_2:
    <<: *custom_model_base

  target_critic_1:
    <<: *custom_model_base

  target_critic_2:
    <<: *custom_model_base

memory:
  class: RandomMemory
  memory_size: 40000

agent:
  class: SAC
  gradient_steps: 1
  batch_size: 512

  discount_factor: 0.99
  polyak: 0.005

  random_timesteps: 0
  learning_starts: 5500
  actor_learning_rate: 0.0003   # actor learning rate
  critic_learning_rate: 0.0003  # critic learning rate
  grad_norm_clip: 0

  learn_entropy: True
  initial_entropy_value: 0.5
  activate_contact_sensors: True
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs:
    size: auto
    device: "cuda:0"
  mixed_precision: True


  experiment:
    directory: 'aloha'
    experiment_name: 'SAC'
    write_interval: 200
    checkpoint_interval: 1000


# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 150000
  environment_info: log